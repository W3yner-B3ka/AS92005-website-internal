<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../style.css" />
    <script src="../script.js" defer></script>
    <script src="../three.js" type="module"></script>
    <title>Mars</title>
  </head>
  <!-- data displays only mars -->
  <body data-planet="mars">
    <!-- 3d canvas -->
    <canvas id="scene"></canvas>
    <!-- Header for the top of the navigation -->
    <div class="header-navigation">
      <h2 class="navigation">Lunara</h2>
      <nav>
        <ul class="nav-links">
          <li><a href="../pages/home-page.html">Home</a></li>
          <li><a href="../pages/moon.html">Moon</a></li>
          <li><a href="../pages/mars.html">Mars</a></li>
        </ul>
      </nav>
      <!-- Change-theme button -->
      <button id="theme-toggle" aria-label="Toggle theme">
        <i class="bi bi-moon"></i>
      </button>
    </div>
    <!-- p stands for position [x,y,z] -->
    <section class="sections section-1" data-px="0" data-py="0" data-pz="10">
      <div class="planet-content">
        <h1>Mars</h1>
      </div>
    </section>
    <section class="sections" data-px="2" data-py="0" data-pz="5.5">
      <div class="planet-content">
        <p>
          Mars is the forth planet of the solar system that has similar size and surface of earth. The diameter of mars is around
           </p>
        </p>
        <!-- Circle diagram This will display -->
         <div class="circle">
          <span class="highlight">6792.38km</span>
         </div>
      </div>
    </section>
      <section class="sections section-3" data-px="0" data-py="0" data-pz="10">
        <div class="planet-content">
          <!-- Boxes -->
           <div class="information-container">
            <div class="information-box">
              <p>
                Gravity: 38% of Earth (3.71N per killogram)
              </p>
            </div>
            <div class="information-box">
              <p>Atmosphere: Thin CO2</p>
            </div>
            <div class="information-box">
              <p>Day-length: 24.6 Hours (This is similar to Earth)</p>
            </div>
           </div>
        </div>
      </section>
  </body>
</html>
